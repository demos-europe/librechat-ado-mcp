name: Upstream Sync

on:
  schedule:
    - cron: '0 8 * * 1'  # Montags 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest upstream release
        id: upstream
        run: |
          LATEST=$(gh api repos/microsoft/azure-devops-mcp/releases/latest --jq '.tag_name')
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest upstream release: $LATEST"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if sync branch already exists
        id: branch_check
        run: |
          BRANCH="sync/upstream-${{ steps.upstream.outputs.tag }}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Branch $BRANCH already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Add upstream remote and fetch tag
        if: steps.branch_check.outputs.exists == 'false'
        run: |
          git remote add upstream https://github.com/microsoft/azure-devops-mcp.git
          git fetch upstream tag ${{ steps.upstream.outputs.tag }} --no-tags

      - name: Attempt merge
        if: steps.branch_check.outputs.exists == 'false'
        id: merge
        run: |
          BRANCH="${{ steps.branch_check.outputs.branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          if git merge ${{ steps.upstream.outputs.tag }} --no-edit -m "chore: merge upstream ${{ steps.upstream.outputs.tag }}"; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove upstream build workflow
        if: steps.branch_check.outputs.exists == 'false' && steps.merge.outputs.result == 'success'
        run: |
          git rm -f .github/workflows/build.yml || true
          git rm -f .github/workflows/dependency-review.yml || true
          git rm -f .github/workflows/ai-issue-processing.yml || true
          git rm -f .github/workflows/pre-release.yml || true
          git rm -f .github/workflows/release.yml || true
          git rm -f .github/workflows/version-update.yml || true
          git commit --amend --no-edit

      - name: Push branch (on success)
        if: steps.branch_check.outputs.exists == 'false' && steps.merge.outputs.result == 'success'
        run: git push origin ${{ steps.branch_check.outputs.branch }}

      - name: Create PR (on success)
        if: steps.branch_check.outputs.exists == 'false' && steps.merge.outputs.result == 'success'
        run: |
          gh pr create \
            --repo demos-europe/librechat-ado-mcp \
            --base main \
            --head "${{ steps.branch_check.outputs.branch }}" \
            --title "chore: upstream sync ${{ steps.upstream.outputs.tag }}" \
            --body "Automatischer Upstream-Sync von \`microsoft/azure-devops-mcp\` ${{ steps.upstream.outputs.tag }}.

          **Bitte prüfen:** On-premise-Patch (\`feat: add on-premise Azure DevOps Server support\`, Commit \`cf9dd43\`) noch intakt?"
        env:
          GH_TOKEN: ${{ secrets.FORK_ACCESS_TOKEN }}

      - name: Log conflict (no auto-merge possible)
        if: steps.branch_check.outputs.exists == 'false' && steps.merge.outputs.result == 'conflict'
        run: |
          echo "::warning::Merge conflict detected for ${{ steps.upstream.outputs.tag }}. Manual merge required."
          echo "Run: git remote add upstream https://github.com/microsoft/azure-devops-mcp.git"
          echo "     git fetch upstream tag ${{ steps.upstream.outputs.tag }} --no-tags"
          echo "     git checkout -b sync/upstream-${{ steps.upstream.outputs.tag }}"
          echo "     git merge ${{ steps.upstream.outputs.tag }}"
